<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Pesquisa — SEM ID</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-weight: bold; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    padding: 20px 40px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    position: relative;
  }
  header h1 { font-family: Arial, sans-serif; font-weight: 900; font-size: 1.6rem; color: #fff; letter-spacing: 0.5px; }
  header p  { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.85rem; color: #a0b4cc; margin-top: 3px; }
  .header-left { display: flex; align-items: center; gap: 18px; flex: 1; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  /* Sync badge */
  .sync-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 5px 14px; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; color: #a0b4cc; white-space: nowrap; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #a0b4cc; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.synced  { background: #4cde80; box-shadow: 0 0 6px #4cde80; }
  .sync-dot.syncing { background: #f5c542; animation: pulse 0.8s infinite; }
  .sync-dot.error   { background: #f5725b; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Upload box */
  .upload-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,0.07); border: 2px dashed rgba(91,200,245,0.55);
    border-radius: 12px; padding: 12px 20px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s; min-width: 200px; text-align: center; position: relative;
  }
  .upload-box:hover, .upload-box.drag-over { background: rgba(91,200,245,0.12); border-color: #5bc8f5; }
  .upload-box input[type=file] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
  .upload-box svg { flex-shrink: 0; }
  .upload-box .upload-title { font-family: Arial, sans-serif; font-weight: 900; font-size: 0.82rem; color: #5bc8f5; text-transform: uppercase; letter-spacing: 0.6px; }
  .upload-box .upload-sub   { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.72rem; color: #7a94b0; }
  .upload-status { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; color: #5bc8f5; margin-top: 2px; }
  .upload-status.error { color: #f5725b; }

  /* Search bar */
  .search-bar { background: #fff; padding: 20px 40px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; border-bottom: 2px solid #e0e6ef; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .search-bar label { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.82rem; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; display: block; }
  .field-group { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
  .search-bar input { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.95rem; padding: 10px 14px; border: 2px solid #c5d3e0; border-radius: 8px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; color: #1a1a2e; background: #f8fafc; }
  .search-bar input:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.12); background: #fff; }
  .btn-clear { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.88rem; padding: 10px 22px; background: #e8edf3; color: #3a4a5c; border: 2px solid #c5d3e0; border-radius: 8px; cursor: pointer; align-self: flex-end; transition: background 0.18s; white-space: nowrap; }
  .btn-clear:hover { background: #d0dae6; }

  /* Stats */
  .stats-bar { background: #1a1a2e; padding: 10px 40px; display: flex; gap: 36px; align-items: center; flex-wrap: wrap; }
  .stat { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.84rem; color: #a0b4cc; }
  .stat span { color: #5bc8f5; font-size: 1.05rem; }

  /* Table */
  .table-wrap { padding: 24px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.09); }
  thead tr { background: linear-gradient(90deg, #0f3460, #16213e); }
  thead th { font-family: Arial, sans-serif; font-weight: 900; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.8px; color: #c8dff0; padding: 14px 18px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; transition: background 0.15s; }
  thead th:hover { background: rgba(255,255,255,0.08); }
  thead th.asc  .sort-icon::after { content: ' ▲'; opacity: 1; }
  thead th.desc .sort-icon::after { content: ' ▼'; opacity: 1; }
  .sort-icon { margin-left: 5px; opacity: 0.5; font-size: 0.75rem; }
  tbody tr { border-bottom: 1px solid #e8edf3; transition: background 0.12s; }
  tbody tr:hover { background: #eef3fa; }
  tbody td { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.9rem; padding: 12px 18px; color: #2c3e50; }
  td.id-col  { font-size: 0.82rem; color: #0f3460; }
  td.val-brl { color: #7b3a10; }
  .badge { display: inline-block; background: #e6f0fa; color: #0f3460; border-radius: 5px; padding: 2px 9px; font-size: 0.8rem; font-family: Arial, sans-serif; font-weight: bold; white-space: normal; word-break: break-word; }
  .no-results { text-align: center; padding: 60px 20px; color: #8a9ab5; font-family: Arial, sans-serif; font-weight: bold; font-size: 1.05rem; }

  /* Column mapper */
  .col-mapper { display: none; background: #fff; border-top: 3px solid #0f3460; padding: 18px 40px; gap: 20px; flex-wrap: wrap; align-items: flex-end; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .col-mapper.visible { display: flex; }
  .col-mapper label  { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
  .col-mapper select { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.9rem; padding: 8px 12px; border: 2px solid #c5d3e0; border-radius: 8px; outline: none; color: #1a1a2e; background: #f8fafc; min-width: 180px; }
  .col-mapper select:focus { border-color: #0f3460; }
  .btn-apply { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.88rem; padding: 10px 24px; background: #0f3460; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.18s; }
  .btn-apply:hover { background: #16213e; }
  .mapper-title { width: 100%; font-family: Arial, sans-serif; font-weight: 900; font-size: 0.88rem; color: #0f3460; margin-bottom: 4px; }

  /* Loading overlay */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.6); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
  .loading-overlay.visible { display: flex; }
  .spinner { width: 44px; height: 44px; border: 4px solid rgba(91,200,245,0.2); border-top-color: #5bc8f5; border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 1rem; color: #fff; }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 10px 40px 32px; flex-wrap: wrap; }
  .pagination button { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.85rem; padding: 7px 14px; border: 2px solid #c5d3e0; border-radius: 7px; background: #fff; color: #1a1a2e; cursor: pointer; transition: all 0.15s; }
  .pagination button:hover:not(:disabled) { background: #0f3460; color: #fff; border-color: #0f3460; }
  .pagination button:disabled { opacity: 0.35; cursor: default; }
  .pagination button.active { background: #0f3460; color: #fff; border-color: #0f3460; }
  .page-info { font-family: Arial, sans-serif; font-weight: bold; font-size: 0.85rem; color: #667; padding: 0 6px; }
</style>
</head>

</header>

<div class="col-mapper" id="colMapper">

</div>

<div class="search-bar">

  <div class="field-group" style="flex:1.6; min-width:320px;">
    <label for="searchDesc">🏷️ Descrição do Item</label>

  </div>
  <button class="btn-clear" onclick="clearFilters()">✕ Limpar</button>
</div>

<div class="stats-bar">

</div>
<div class="pagination" id="pagination"></div>

let RAW_DATA = [];
let uploadedRaw = [];
let uploadedColumns = [];

const PAGE_SIZE = 50;
let filtered = [];
let currentPage = 1;
let sortKey = 'VALOR_REAL';
let sortDir = -1;
let lastKnownUpdatedAt = null;

// ── Sync helpers ─────────────────────────────────────────────────
function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Carregando...';
  document.getElementById('loadingOverlay').classList.add('visible');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('visible');
}

// ── Firebase REST helpers ────────────────────────────────────────
async function fbGet(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbPut(url, data) {
  const r = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Save to Firebase ─────────────────────────────────────────────
async function saveToFirebase(data, filename) {
  setSyncStatus('syncing', 'Salvando na nuvem...');
  try {
    const updatedAt = new Date().toISOString();
    await fbPut(FB_DATA, data);
    await fbPut(FB_META, { filename: filename || 'arquivo', total: data.length, updatedAt });
    lastKnownUpdatedAt = updatedAt;
    const dtStr = fmtDate(updatedAt);
    setSyncStatus('synced', '✔ Firebase · ' + dtStr);
  } catch(e) {
    setSyncStatus('error', 'Erro ao salvar: ' + e.message);
    throw e;
  }
}

// ── Load from Firebase ───────────────────────────────────────────
async function loadFromFirebase() {
  const meta = await fbGet(FB_META);
  if (!meta || !meta.total) return null;
  const data = await fbGet(FB_DATA);
  if (!data || !Array.isArray(data)) return null;
  return { data, meta };
}

// ── Poll for remote changes (every 30s) ──────────────────────────
async function pollFirebase() {
  try {
    const meta = await fbGet(FB_META);
    if (!meta || meta.updatedAt === lastKnownUpdatedAt) return;
    setSyncStatus('syncing', 'Atualizando...');
    const result = await loadFromFirebase();
    if (result && result.data.length > 0) {
      RAW_DATA = result.data;
      lastKnownUpdatedAt = meta.updatedAt;
      document.getElementById('headerSub').textContent =
        RAW_DATA.length.toLocaleString('pt-BR') + ' Pacotes· ' + (meta.filename || 'nuvem');
      setSyncStatus('synced', '✔ Atualizado · ' + fmtDate(meta.updatedAt));
      applyFilter();
    }
  } catch(e) { /* silent */ }
}

function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) { return ''; }
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  showLoading('Carregando dados da nuvem...');
  try {
    const result = await loadFromFirebase();
    if (result && result.data.length > 0) {
      RAW_DATA = result.data;
      lastKnownUpdatedAt = result.meta.updatedAt;
      document.getElementById('headerSub').textContent =
        RAW_DATA.length.toLocaleString('pt-BR') + ' Pacotes· ' + (result.meta.filename || 'nuvem');
      setSyncStatus('synced', '✔ Salvo · ' + fmtDate(result.meta.updatedAt));
    } else {
      RAW_DATA = [...BUILTIN_DATA];
      document.getElementById('headerSub').textContent = '4.595 registros';
      setSyncStatus('synced', 'Sem dados na nuvem — usando padrão');
    }
  } catch(e) {
    RAW_DATA = [...BUILTIN_DATA];
    document.getElementById('headerSub').textContent = '4.595 registros';
    setSyncStatus('error', 'Banco de Dados offline · dados locais');
  }
  hideLoading();
  document.getElementById('th-VALOR_REAL').classList.add('desc');
  applyFilter();
  setInterval(pollFirebase, 30000);
}

// ── File handling ─────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadBox').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function handleFileChange(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const name = file.name.toLowerCase();
  setStatus('Carregando...', false);
  document.getElementById('uploadSub').textContent = file.name;

  const readAs = name.endsWith('.csv') ? 'binary' : 'array';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = readAs === 'binary'
        ? XLSX.read(e.target.result, {type:'binary'})
        : XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
      handleParsed(rows, file.name);
    } catch(err) { setStatus('Erro ao ler arquivo.', true); }
  };
  if (readAs === 'binary') reader.readAsBinaryString(file);
  else reader.readAsArrayBuffer(file);
}

function handleParsed(rows, filename) {
  if (!rows.length) { setStatus('Arquivo vazio.', true); return; }
  uploadedRaw = rows;
  uploadedColumns = Object.keys(rows[0]);

  const autoId   = uploadedColumns.find(c => /shipment.id|shp.*id|\bid\b/i.test(c));
  const autoDesc = uploadedColumns.find(c => /desc|item|produto|nome/i.test(c));
  const autoVal  = uploadedColumns.find(c => /real|brl|valor/i.test(c));

  if (autoId && autoDesc && autoVal) {
    applyMappedData(autoId, autoDesc, autoVal, filename);
  } else {
    ['mapId','mapDesc','mapVal'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = uploadedColumns.map(c => `<option value="${c}">${c}</option>`).join('');
    });
    if (autoId)   document.getElementById('mapId').value   = autoId;
    if (autoDesc) document.getElementById('mapDesc').value = autoDesc;
    if (autoVal)  document.getElementById('mapVal').value  = autoVal;
    document.getElementById('colMapper').classList.add('visible');
    setStatus('Mapeie as colunas ↓', false);
  }
}

function applyMapping() {
  const id   = document.getElementById('mapId').value;
  const desc = document.getElementById('mapDesc').value;
  const val  = document.getElementById('mapVal').value;
  applyMappedData(id, desc, val, '');
  document.getElementById('colMapper').classList.remove('visible');
}

async function applyMappedData(idCol, descCol, valCol, filename) {
  const mapped = uploadedRaw.map(r => ({
    SHP_SHIPMENT_ID: r[idCol]   ?? '',
    SHP_ITEM_DESC:   String(r[descCol] ?? ''),
    VALOR_REAL:      parseFloat(r[valCol]) || 0
  }));
  RAW_DATA = mapped;
  const n = RAW_DATA.length;
  document.getElementById('headerSub').textContent =
    n.toLocaleString('pt-BR') + ' Pacotes· ' + (filename || 'arquivo carregado');
  setStatus('Enviando para Firebase...', false);
  showLoading('Salvando ' + n.toLocaleString('pt-BR') + ' Pacotesna nuvem...');
  try {
    await saveToFirebase(mapped, filename);
    setStatus('', false);
  } catch(e) {
    setStatus('Erro: ' + e.message, true);
  }
  hideLoading();
  sortKey = 'VALOR_REAL'; sortDir = -1;
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('asc','desc'));
  document.getElementById('th-VALOR_REAL').classList.add('desc');
  clearFilters();
}

function setStatus(msg, isError) {
  const el = document.getElementById('uploadStatus');
  el.textContent = msg;
  el.className = 'upload-status' + (isError ? ' error' : '');
}

// ── Table ─────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null) return '—';
  return 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function applyFilter() {
  const id   = document.getElementById('searchId').value.trim().toLowerCase();
  const desc = document.getElementById('searchDesc').value.trim().toLowerCase();
  filtered = RAW_DATA.filter(r => {
    const matchId   = !id   || String(r.SHP_SHIPMENT_ID).toLowerCase().includes(id);
    const matchDesc = !desc || (r.SHP_ITEM_DESC || '').toLowerCase().includes(desc);
    return matchId && matchDesc;
  });
  applySort(true);
  render();
}

function clearFilters() {
  document.getElementById('searchId').value = '';
  document.getElementById('searchDesc').value = '';
  applyFilter();
}

function sortBy(key) {
  sortDir = (sortKey === key) ? sortDir * -1 : (key === 'VALOR_REAL' ? -1 : 1);
  sortKey = key;
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('asc','desc'));
  document.getElementById('th-' + key).classList.add(sortDir === 1 ? 'asc' : 'desc');
  applySort(true); render();
}

function applySort(resetPage) {
  if (!sortKey) return;
  filtered.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  if (resetPage) currentPage = 1;
}

function render() {
  const total = filtered.length;
  document.getElementById('countResult').textContent = total.toLocaleString('pt-BR');
  document.getElementById('sumBrl').textContent = fmt(filtered.reduce((s,r) => s + (r.VALOR_REAL||0), 0));
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const slice = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  if (!slice.length) {
    tbody.innerHTML = ''; noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    tbody.innerHTML = slice.map(r => `
      <tr>
        <td class="id-col">${r.SHP_SHIPMENT_ID}</td>
        <td><span class="badge">${r.SHP_ITEM_DESC || '—'}</span></td>
        <td class="val-brl">${fmt(r.VALOR_REAL)}</td>
      </tr>`).join('');
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let btns = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Anterior</button>`;
  const range = [];
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) range.push(i);
  if (range[0] > 1) { btns += `<button onclick="goPage(1)">1</button>`; if(range[0]>2) btns += `<span class="page-info">…</span>`; }
  range.forEach(i => { btns += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`; });
  if (range[range.length-1] < totalPages) {
    if (range[range.length-1] < totalPages-1) btns += `<span class="page-info">…</span>`;
    btns += `<button onclick="goPage(${totalPages})">${totalPages}</button>`;
  }
  btns += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Próximo ›</button>`;
  btns += `<span class="page-info">Pág. ${currentPage} / ${totalPages}</span>`;
  pg.innerHTML = btns;
}

function goPage(p) { currentPage = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

init();
